{% extends 'cadastro/base.html' %}

{% block conteudo %}

<h2 class="titulo">{{ total }} Pessoas Cadastradas</h2>

<div class="cards-container">
  {% for pessoa in pessoas %}
    <div class="card">
      
      <div class="avatar">
        {{ pessoa.nome|slice:":1" }}
      </div>

      <h3>{{ pessoa.nome }}</h3>
      <p>{{ pessoa.email }}</p>

      <a href="{% url 'detalhe' pessoa.id %}" class="btn">Ver perfil</a>
    </div>
  {% empty %}
    <p class="vazio">Ninguém está cadastrado.</p>
  {% endfor %}
</div>

{% endblock %}
